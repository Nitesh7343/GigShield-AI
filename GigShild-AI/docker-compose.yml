version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: gigshield-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: gigshield-ai
    volumes:
      - mongodb-data:/data/db
    networks:
      - gigshield-network

  backend:
    build:
      context: ./backend
    container_name: gigshield-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/gigshield-ai
      JWT_SECRET: ${JWT_SECRET:-gigshield-demo-secret-key}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      ADMIN_KEY: ${ADMIN_KEY:-demo-admin-key}
    depends_on:
      - mongodb
    networks:
      - gigshield-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: gigshield-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - gigshield-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb-data:

networks:
  gigshield-network:
    driver: bridge
